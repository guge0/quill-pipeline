facts:
  - "故事发生在临江市,旧城区为江湾区"
  - "主角姓名:江叙白,32 岁,独立调查记者"
  - "江叙白五年前从市局刑侦支队离职,离职原因暂不揭示"
  - "近三个月江湾区共有六名失踪者,警方以'自行离家'结案四起"
  - "苏皓,22 岁,苏蔓之弟,第六名失踪者"
  - "苏皓失踪当晚最后一次通话的基站位于回声巷"
  - "回声巷位于江湾区东侧,长约三百米"
  - "回声巷 17 号是旧货当铺'守拙斋'"
  - "守拙斋只在雨夜亮灯营业"
  - "守拙斋老板聂守仁,左手常年戴黑色手套"
  - "市档案馆位于江湾区,旧案卷宗在三楼"
  - "档案编号 A-113 对应 1998 年'江湾码头沉箱案'"

